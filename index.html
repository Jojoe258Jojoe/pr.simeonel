<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Money Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Complete Your Payment</h1>
        <form id="payment-form">
            <div class="form-group">
                <label for="amount">Amount (ZMW):</label>
                <input type="number" id="amount" name="amount" required step="0.01">
            </div>
            <div class="form-group">
                <label for="phone">Mobile Money Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="e.g., 097xxxxxxx" required>
            </div>
            <div class="form-group">
                <label for="network">Select Network:</label>
                <select id="network" name="network" required>
                    <option value="mtn">MTN Mobile Money</option>
                    <option value="airtel">Airtel Money</option>
                </select>
            </div>
            <button type="submit" id="pay-btn">Pay Now</button>
        </form>
        <div id="message"></div>
    </div>
    <script src="public/script.js"></script>
</body>
</html>
